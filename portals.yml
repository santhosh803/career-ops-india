title_filter:
  positive:
    - "AI"
    - "ML"
    - "LLM"
    - "Generative AI"
    - "GenAI"
    - "Machine Learning"
    - "Agent"
    - "Agentic"
    - "NLP"
    - "Computer Vision"
    - "Deep Learning"
    - "Data Scientist"
    - "Applied AI"
    - "RAG"
  negative:
    - "Intern"
    - "Junior"
    - "Student"
    - "Trainee"
    - ".NET"
    - "Java"
    - "PHP"
    - "iOS"
    - "Android"
    - "Frontend"
    - "UI/UX"
    - "Sales"
    - "Marketing"
    - "HR"

location_filter:
  allow:
    - "Bengaluru"
    - "Bangalore"
    - "Chennai"
    - "Hyderabad"
    - "Remote"
    - "India"
  block:
    - "USA"
    - "United States"
    - "UK"
    - "London"
    - "Europe"
    - "Germany"
    - "France"

search_queries:
  # Instahyre, Wellfound (AngelList), LinkedIn, Naukri queries (fallback for websearch)
  - 'site:instahyre.com/job "AI Engineer" OR "Machine Learning" OR "LLM" (Bengaluru OR Chennai OR Hyderabad OR Remote)'
  - 'site:wellfound.com/job "AI Engineer" OR "Machine Learning" OR "LLM" (Bengaluru OR Chennai OR Hyderabad OR Remote)'

